<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aeroporto Inteligente</title>
<link rel="stylesheet" href="teste.css">
</head>
<body>

<div class="painel">

<h1>✈️ Aeroporto Inteligente</h1>

<select id="tipoVoo">
<option value="economico">Voo Econômico</option>
<option value="comercial">Voo Comercial</option>
<option value="luxo">Jato Executivo (Luxo)</option>
</select>

<div class="pista">
<img id="aviao" src="https://m.media-amazon.com/images/M/MV5BZjRjMWFkNmMtMjZkOS00MDQwLWE2ZDYtYjU4NGNhNWE2ZGI4XkEyXkFqcGc@._V1_.jpg">
</div>

<div class="info">

<p>Tipo de voo: <span id="tipo">---</span></p>
<p>Velocidade: <span id="velocidade">0</span> km/h</p>
<p>Altitude: <span id="altitude">0</span> pés</p>
<p>Conforto: <span id="conforto">---</span></p>

</div>

<div class="botoes">

<button onclick="selecionarVoo()">Selecionar Voo</button>
<button onclick="decolar()">Decolar</button>
<button onclick="pousar()">Pousar</button>

</div>

</div>

<script src="teste.js"></script>
</body>
</html>
